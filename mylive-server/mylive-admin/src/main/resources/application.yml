server:
  port: ${ADMIN_SERVER_PORT:7070}
  forward-headers-strategy: native
  servlet:
    context-path: ${ADMIN_CONTEXT_PATH:/admin}

spring:
  application:
    name: mylive-admin

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      database: ${REDIS_DATABASE:1}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8

app:
  project-folder: ${APP_PROJECT_FOLDER}
  admin-account: ${ADMIN_ACCOUNT}
  admin-password: ${ADMIN_PASSWORD_HASH}

minio:
  endpoint: ${MINIO_ENDPOINT}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}
  base-prefix: ${MINIO_BASE_PREFIX:file/}
  auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}

storage:
  type: ${STORAGE_TYPE:local}

es:
  index-name: ${ES_INDEX_NAME:mylive_video}